name: Publish Best of Denver Post

on:
  schedule:
    # 9:00 AM Mountain Daylight Time = 15:00 UTC (MDT, used May-Nov)
    # 9:00 AM Mountain Standard Time = 16:00 UTC (MST, used Nov-Mar)
    # Using 15:00 UTC to hit 9am MDT in summer; runs at 8am MST in winter (close enough)
    - cron: "0 15 * * 1,3,5"

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no git push)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so the push triggers Vercel deploy webhook
          token: ${{ secrets.PUBLISH_BOT_PAT }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "Real Good Denver Bot"
          git config user.email "ryan@ryanestes.info"

      - name: Run publish pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            npx tsx scripts/run-publish.ts --dry-run
          else
            npx tsx scripts/run-publish.ts
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-logs-${{ github.run_id }}
          path: scripts/logs/
          retention-days: 30
