name: Publish Best of Denver Post

on:
  schedule:
    # Primary run: ~9:27 AM Mountain Daylight Time (15:27 UTC).
    # Offset off the top of the hour on purpose: GitHub's cron scheduler is
    # heavily contended at :00 and was delaying on-the-hour runs by hours or
    # dropping them entirely. A minute past the hour dodges most of that.
    - cron: "27 15 * * 1,3,5"
    # Catch-up run: ~1:27 PM MDT (19:27 UTC). Publishes ONLY if no post went
    # out earlier today (run-publish.ts --skip-if-published-today), so a
    # dropped/late primary run still gets a post out the same day.
    - cron: "27 19 * * 1,3,5"

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no git push)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so the push triggers Vercel deploy webhook
          token: ${{ secrets.PUBLISH_BOT_PAT }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "Real Good Denver Bot"
          git config user.email "ryan@ryanestes.info"

      - name: Run publish pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          SCHEDULE="${{ github.event.schedule }}"
          FLAGS=""
          # The later catch-up cron only publishes if the primary run didn't.
          if [ "$SCHEDULE" = "27 19 * * 1,3,5" ]; then
            FLAGS="--skip-if-published-today"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            npx tsx scripts/run-publish.ts --dry-run $FLAGS
          else
            npx tsx scripts/run-publish.ts $FLAGS
          fi

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publish-logs-${{ github.run_id }}
          path: scripts/logs/
          retention-days: 30
