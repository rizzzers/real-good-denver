name: Publish Newsletter Issue

# Checks the Real Good Denver Beehiiv publication for newly confirmed issues and
# publishes any that are not yet on the website. The publisher is idempotent
# (dedup state in scripts/newsletter-published.json), so running it on a daily
# cadence simply picks up each new issue within a day of it sending. Issues go
# out roughly weekly, usually in the late afternoon or evening Mountain time, so
# we run two windows a day: one in the evening to catch same-day sends and one
# the next midday as a backstop. GitHub cron is best-effort; double runs are safe.

on:
  schedule:
    - cron: "30 23 * * *" # ~5:30 PM MDT, catches same-evening sends
    - cron: "0 14 * * *"  # ~8:00 AM MDT, backstop for anything missed
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no file writes, no git push)"
        required: false
        default: "false"
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so the push triggers the Vercel deploy webhook.
          token: ${{ secrets.PUBLISH_BOT_PAT }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "Real Good Denver Bot"
          git config user.email "ryan@ryanestes.info"

      - name: Publish new newsletter issues
        env:
          BEEHIIV_PUB_RGD: ${{ secrets.BEEHIIV_PUB_RGD }}
          BEEHIIV_KEY_RGD: ${{ secrets.BEEHIIV_KEY_RGD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx tsx scripts/publish-newsletter.ts --dry-run
          else
            npx tsx scripts/publish-newsletter.ts
          fi
